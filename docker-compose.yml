version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: dj_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: djdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dj_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
